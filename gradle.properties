# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official

# Server configuration
PORT=8080
HOST=localhost

# Database configuration (defaults for local development)
# Override with environment variables in production:
# DATABASE_URL, DATABASE_USER, DATABASE_PASSWORD
DATABASE_URL=jdbc:postgresql://localhost:5432/voteapp
DATABASE_USER=postgres
DATABASE_PASSWORD=postgres

# Firebase service account JSON path (optional, can be set via GOOGLE_APPLICATION_CREDENTIALS)
FIREBASE_SERVICE_ACCOUNT_JSON_PATH=./firebase-service-account.json

# Flyway migration (true to run migrations on startup)
FLYWAY_MIGRATE=true
